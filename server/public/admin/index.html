<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprout AI — Админ-панель</title>
<link rel="icon" type="image/png" href="/logo.png">
<link rel="apple-touch-icon" href="/logo.png">
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Literata:wght@600;700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --surface: #f9f9f8; --white: #fff; --on-surface: #191c1c; --muted: #414844;
    --outline: #c1c8c2; --primary: #012d1d; --primary-c: #1b4332;
    --mint: #bdeacd; --sage: #eef4f0; --terra: #741b04; --terra-soft: #ffdad2;
    --shadow: 0 8px 30px rgba(27,67,50,.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Work Sans',sans-serif; background:var(--surface); color:var(--on-surface); font-size:14.5px; }
  h1,h2,h3 { font-family:'Literata',serif; color:var(--primary); }
  button { font-family:inherit; cursor:pointer; }
  input, select { font-family:inherit; font-size:14px; }

  /* LOGIN */
  #login-view { min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .login-card { background:#fff; border-radius:24px; box-shadow:var(--shadow); padding:40px; width:360px; }
  .login-card h1 { font-size:24px; margin-bottom:6px; }
  .login-card p { color:var(--muted); margin-bottom:24px; font-size:14px; }
  .field { margin-bottom:14px; }
  .field label { display:block; font-size:12.5px; font-weight:600; color:var(--muted); margin-bottom:6px; letter-spacing:.03em; }
  .field input { width:100%; background:#f3f4f3; border:1.5px solid transparent; border-radius:14px; padding:12px 14px; outline:none; transition:border .2s; }
  .field input:focus { border-color:var(--primary-c); background:#fff; }
  .btn { display:inline-flex; align-items:center; gap:8px; background:var(--primary); color:#fff; border:none; border-radius:14px; padding:12px 22px; font-weight:600; font-size:14.5px; transition:opacity .2s; }
  .btn:hover { opacity:.88; }
  .btn.full { width:100%; justify-content:center; }
  .btn.ghost { background:transparent; color:var(--primary); border:1.5px solid var(--primary); }
  .btn.sm { padding:7px 14px; font-size:13px; border-radius:10px; }
  .btn.danger { background:var(--terra); }
  .err { color:var(--terra); font-size:13px; margin-top:12px; display:none; }

  /* SHELL */
  #app-view { display:none; }
  .shell { display:flex; min-height:100vh; }
  aside { width:230px; background:var(--primary); color:#fff; padding:28px 16px; flex-shrink:0; display:flex; flex-direction:column; }
  aside .brand { display:flex; align-items:center; gap:10px; font-family:'Literata',serif; font-weight:700; font-size:20px; color:#fff; padding:0 12px 26px; }
  aside .brand img { width:26px; height:26px; border-radius:7px; object-fit:contain; }
  aside .brand span { color:#a5d0b9; }
  aside nav a { display:flex; align-items:center; gap:11px; color:#a5d0b9; text-decoration:none; padding:11px 12px; border-radius:12px; margin-bottom:4px; font-weight:500; transition:.2s; }
  aside nav a:hover { background:rgba(255,255,255,.08); color:#fff; }
  aside nav a.active { background:#fff; color:var(--primary); font-weight:600; }
  aside .logout { margin-top:auto; }
  main { flex:1; padding:34px 38px; max-width:1100px; }
  main h2 { font-size:26px; margin-bottom:22px; }

  /* STATS */
  .stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:16px; margin-bottom:28px; }
  .stat { background:#fff; border-radius:20px; box-shadow:var(--shadow); padding:22px; }
  .stat .v { font-family:'Literata',serif; font-size:32px; font-weight:700; color:var(--primary); }
  .stat .l { font-size:12.5px; color:var(--muted); margin-top:4px; letter-spacing:.04em; text-transform:uppercase; font-weight:600; }
  .chart-card { background:#fff; border-radius:20px; box-shadow:var(--shadow); padding:24px; margin-bottom:24px; }
  .chart-card h3 { font-size:16px; margin-bottom:16px; }
  .bars { display:flex; align-items:flex-end; gap:4px; height:120px; }
  .bar { flex:1; background:var(--mint); border-radius:6px 6px 2px 2px; min-height:3px; position:relative; }
  .bar:hover { background:var(--primary-c); }
  .bar .tip { display:none; position:absolute; bottom:calc(100% + 6px); left:50%; transform:translateX(-50%); background:var(--primary); color:#fff; font-size:11px; padding:4px 8px; border-radius:8px; white-space:nowrap; z-index:2; }
  .bar:hover .tip { display:block; }

  /* TABLES */
  .toolbar { display:flex; gap:12px; margin-bottom:18px; align-items:center; }
  .toolbar input { flex:1; max-width:340px; background:#fff; border:1.5px solid var(--outline); border-radius:14px; padding:11px 16px; outline:none; }
  .toolbar input:focus { border-color:var(--primary-c); }
  .card { background:#fff; border-radius:20px; box-shadow:var(--shadow); overflow:hidden; }
  table { width:100%; border-collapse:collapse; }
  th { text-align:left; font-size:11.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); padding:14px 18px; border-bottom:1px solid #edeeed; background:#fbfbfa; }
  td { padding:13px 18px; border-bottom:1px solid #f3f4f3; vertical-align:middle; }
  tr:last-child td { border-bottom:none; }
  .chip { display:inline-block; font-size:11.5px; font-weight:600; border-radius:999px; padding:4px 11px; }
  .chip.pro { background:var(--mint); color:var(--primary-c); }
  .chip.free { background:#edeeed; color:var(--muted); }
  .chip.blocked { background:var(--terra-soft); color:var(--terra); }
  .chip.admin { background:var(--primary); color:#fff; }
  .row-actions { display:flex; gap:8px; flex-wrap:wrap; }
  .pager { display:flex; gap:10px; align-items:center; justify-content:center; padding:18px; }
  .pager button { background:#fff; border:1.5px solid var(--outline); border-radius:10px; padding:7px 14px; }
  .pager button:disabled { opacity:.4; cursor:default; }
  .muted { color:var(--muted); font-size:13px; }
  .post-text { max-width:340px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .thumb { width:44px; height:44px; border-radius:10px; object-fit:cover; background:#edeeed; }
  .thumb-wrap { position:relative; width:44px; height:44px; border-radius:10px; background:#edeeed; display:flex; align-items:center; justify-content:center; color:var(--outline); overflow:hidden; }
  .thumb-wrap img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .thumb-wrap [data-lucide] { width:20px; height:20px; }
  [data-lucide] { width:20px; height:20px; stroke-width:2; vertical-align:middle; }
  aside nav a [data-lucide], aside .logout [data-lucide] { width:18px; height:18px; }
  .empty { padding:40px; text-align:center; color:var(--muted); }
  @media (max-width:800px) { aside{width:70px;} aside .brand,aside nav a span{display:none;} main{padding:20px;} }
</style>
</head>
<body>

<div id="login-view">
  <form class="login-card" id="login-form">
    <h1>Sprout AI</h1>
    <p>Вход в панель администратора</p>
    <div class="field">
      <label>EMAIL</label>
      <input type="email" id="login-email" required autocomplete="username">
    </div>
    <div class="field">
      <label>ПАРОЛЬ</label>
      <input type="password" id="login-password" required autocomplete="current-password">
    </div>
    <button class="btn full" type="submit">Войти</button>
    <div class="err" id="login-err"></div>
  </form>
</div>

<div id="app-view">
  <div class="shell">
    <aside>
      <div class="brand"><img src="/logo.png" alt=""> Sprout <span>Admin</span></div>
      <nav>
        <a href="#dashboard" data-tab="dashboard" class="active"><i data-lucide="layout-dashboard"></i> <span>Дашборд</span></a>
        <a href="#users" data-tab="users"><i data-lucide="users"></i> <span>Пользователи</span></a>
        <a href="#posts" data-tab="posts"><i data-lucide="file-text"></i> <span>Посты</span></a>
        <a href="#scans" data-tab="scans"><i data-lucide="scan-search"></i> <span>Сканы</span></a>
      </nav>
      <div class="logout">
        <a href="#" id="logout-btn" style="color:#a5d0b9;text-decoration:none;padding:11px 12px;display:flex;align-items:center;gap:11px;"><i data-lucide="log-out"></i> <span>Выйти</span></a>
      </div>
    </aside>
    <main id="main"></main>
  </div>
</div>

<script>
const api = {
  token: localStorage.getItem('adminToken') || null,
  async req(method, path, body) {
    const res = await fetch('/api' + path, {
      method,
      headers: {
        ...(body ? { 'Content-Type': 'application/json' } : {}),
        ...(this.token ? { Authorization: 'Bearer ' + this.token } : {}),
      },
      body: body ? JSON.stringify(body) : undefined,
    });
    const data = await res.json().catch(() => ({}));
    if (res.status === 401 || res.status === 403) { logout(); throw new Error(data.error || 'Нет доступа'); }
    if (!res.ok) throw new Error(data.error || 'Ошибка сервера');
    return data;
  },
};

const $ = (s) => document.querySelector(s);
const main = $('#main');
let currentTab = 'dashboard';

function esc(s) { return String(s ?? '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtDate(d) { return new Date(d).toLocaleDateString('ru-RU', { day:'numeric', month:'short', year:'numeric' }); }

// ---------- AUTH ----------
function showApp() {
  $('#login-view').style.display = 'none';
  $('#app-view').style.display = 'block';
  navigate(location.hash.slice(1) || 'dashboard');
}
function logout() {
  localStorage.removeItem('adminToken');
  api.token = null;
  $('#app-view').style.display = 'none';
  $('#login-view').style.display = 'flex';
}
$('#login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const err = $('#login-err');
  err.style.display = 'none';
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: $('#login-email').value, password: $('#login-password').value }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Ошибка входа');
    if (data.user.role !== 'admin') throw new Error('Этот аккаунт не администратор');
    api.token = data.accessToken;
    localStorage.setItem('adminToken', data.accessToken);
    showApp();
  } catch (ex) {
    err.textContent = ex.message;
    err.style.display = 'block';
  }
});
$('#logout-btn').addEventListener('click', (e) => { e.preventDefault(); logout(); });

// ---------- NAVIGATION ----------
document.querySelectorAll('aside nav a').forEach((a) => {
  a.addEventListener('click', () => setTimeout(() => navigate(a.dataset.tab), 0));
});
function navigate(tab) {
  currentTab = tab;
  document.querySelectorAll('aside nav a').forEach((a) => a.classList.toggle('active', a.dataset.tab === tab));
  ({ dashboard: renderDashboard, users: renderUsers, posts: renderPosts, scans: renderScans }[tab] || renderDashboard)();
}

// ---------- DASHBOARD ----------
async function renderDashboard() {
  main.innerHTML = '<h2>Дашборд</h2><div class="muted">Загрузка…</div>';
  try {
    const s = await api.req('GET', '/admin/stats');
    main.innerHTML = `
      <h2>Дашборд</h2>
      <div class="stat-grid">
        <div class="stat"><div class="v">${s.users}</div><div class="l">Пользователей</div></div>
        <div class="stat"><div class="v">${s.proUsers}</div><div class="l">Pro-подписок</div></div>
        <div class="stat"><div class="v">${s.plants}</div><div class="l">Растений</div></div>
        <div class="stat"><div class="v">${s.scans}</div><div class="l">Сканов ИИ</div></div>
        <div class="stat"><div class="v">${s.posts}</div><div class="l">Постов</div></div>
      </div>
      ${chart('Регистрации за 30 дней', s.regByDay)}
      ${chart('Сканы за 30 дней', s.scansByDay)}
    `;
  } catch (ex) { main.innerHTML = '<h2>Дашборд</h2><div class="err" style="display:block">' + esc(ex.message) + '</div>'; }
}
function chart(title, rows) {
  if (!rows || !rows.length) return `<div class="chart-card"><h3>${title}</h3><div class="muted">Пока нет данных</div></div>`;
  const max = Math.max(...rows.map((r) => r.count));
  const bars = rows.map((r) =>
    `<div class="bar" style="height:${Math.max(3, (r.count / max) * 100)}%"><span class="tip">${r._id}: ${r.count}</span></div>`
  ).join('');
  return `<div class="chart-card"><h3>${title}</h3><div class="bars">${bars}</div></div>`;
}

// ---------- USERS ----------
let usersState = { page: 1, q: '' };
async function renderUsers() {
  main.innerHTML = `
    <h2>Пользователи</h2>
    <div class="toolbar">
      <input id="user-search" placeholder="Поиск по email или имени…" value="${esc(usersState.q)}">
    </div>
    <div class="card" id="users-table"><div class="empty">Загрузка…</div></div>
  `;
  $('#user-search').addEventListener('input', debounce((e) => {
    usersState = { page: 1, q: e.target.value };
    loadUsers();
  }, 350));
  loadUsers();
}
async function loadUsers() {
  const box = $('#users-table');
  if (!box) return;
  try {
    const data = await api.req('GET', `/admin/users?page=${usersState.page}&q=${encodeURIComponent(usersState.q)}`);
    if (!data.users.length) { box.innerHTML = '<div class="empty">Никого не нашлось</div>'; return; }
    box.innerHTML = `
      <table>
        <thead><tr><th>Пользователь</th><th>План</th><th>Сканов</th><th>Регистрация</th><th>Статус</th><th>Действия</th></tr></thead>
        <tbody>
          ${data.users.map((u) => `
            <tr>
              <td><b>${esc(u.name)}</b><br><span class="muted">${esc(u.email)}</span></td>
              <td><span class="chip ${u.role === 'admin' ? 'admin' : u.plan}">${u.role === 'admin' ? 'admin' : u.plan}</span></td>
              <td>${u.scansUsed}</td>
              <td class="muted">${fmtDate(u.createdAt)}</td>
              <td>${u.isBlocked ? '<span class="chip blocked">Заблокирован</span>' : '<span class="chip free">Активен</span>'}</td>
              <td>
                <div class="row-actions">
                  ${u.role === 'admin' ? '' : `
                    <button class="btn sm ${u.plan === 'pro' ? 'ghost' : ''}" onclick="setPlan('${u.id}','${u.plan === 'pro' ? 'free' : 'pro'}')">
                      ${u.plan === 'pro' ? 'Снять Pro' : 'Выдать Pro'}
                    </button>
                    <button class="btn sm ${u.isBlocked ? 'ghost' : 'danger'}" onclick="setBlocked('${u.id}',${!u.isBlocked})">
                      ${u.isBlocked ? 'Разблокировать' : 'Заблокировать'}
                    </button>
                  `}
                </div>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>
      ${pager(data.page, data.pages, 'usersPage')}
    `;
  } catch (ex) { box.innerHTML = '<div class="empty">' + esc(ex.message) + '</div>'; }
}
window.usersPage = (p) => { usersState.page = p; loadUsers(); };
window.setPlan = async (id, plan) => { await api.req('PATCH', '/admin/users/' + id, { plan }); loadUsers(); };
window.setBlocked = async (id, isBlocked) => { await api.req('PATCH', '/admin/users/' + id, { isBlocked }); loadUsers(); };

// ---------- POSTS ----------
let postsPage = 1;
async function renderPosts() {
  main.innerHTML = '<h2>Модерация постов</h2><div class="card" id="posts-table"><div class="empty">Загрузка…</div></div>';
  loadPosts();
}
async function loadPosts() {
  const box = $('#posts-table');
  if (!box) return;
  try {
    const data = await api.req('GET', '/admin/posts?page=' + postsPage);
    if (!data.posts.length) { box.innerHTML = '<div class="empty">Постов пока нет</div>'; return; }
    box.innerHTML = `
      <table>
        <thead><tr><th></th><th>Текст</th><th>Автор</th><th>Лайки</th><th>Дата</th><th></th></tr></thead>
        <tbody>
          ${data.posts.map((p) => `
            <tr>
              <td><div class="thumb-wrap"><i data-lucide="image"></i>${p.imageUrl ? `<img src="${esc(p.imageUrl)}" onerror="this.remove()">` : ''}</div></td>
              <td class="post-text">${esc(p.text)}</td>
              <td class="muted">${esc(p.userId?.name || '—')}<br>${esc(p.userId?.email || '')}</td>
              <td>${p.likes.length}</td>
              <td class="muted">${fmtDate(p.createdAt)}</td>
              <td><button class="btn sm danger" onclick="delPost('${p._id}')">Удалить</button></td>
            </tr>`).join('')}
        </tbody>
      </table>
      ${pager(data.page, data.pages, 'postsPageGo')}
    `;
    lucide.createIcons();
  } catch (ex) { box.innerHTML = '<div class="empty">' + esc(ex.message) + '</div>'; }
}
window.postsPageGo = (p) => { postsPage = p; loadPosts(); };
window.delPost = async (id) => {
  if (!confirm('Удалить пост?')) return;
  await api.req('DELETE', '/admin/posts/' + id);
  loadPosts();
};

// ---------- SCANS ----------
let scansPage = 1;
async function renderScans() {
  main.innerHTML = '<h2>Журнал сканов</h2><div class="card" id="scans-table"><div class="empty">Загрузка…</div></div>';
  loadScans();
}
async function loadScans() {
  const box = $('#scans-table');
  if (!box) return;
  try {
    const data = await api.req('GET', '/admin/scans?page=' + scansPage);
    if (!data.scans.length) { box.innerHTML = '<div class="empty">Сканов пока нет</div>'; return; }
    box.innerHTML = `
      <table>
        <thead><tr><th></th><th>Растение</th><th>Диагноз</th><th>Пользователь</th><th>Дата</th></tr></thead>
        <tbody>
          ${data.scans.map((s) => `
            <tr>
              <td><div class="thumb-wrap"><i data-lucide="leaf"></i>${s.imageUrl ? `<img src="${esc(s.imageUrl)}" onerror="this.remove()">` : ''}</div></td>
              <td><b>${esc(s.result?.commonName || '—')}</b><br><span class="muted">${esc(s.result?.species || '')}</span></td>
              <td>${s.result?.isHealthy
                ? '<span class="chip pro">Здоровое</span>'
                : `<span class="chip blocked">${esc(s.result?.diagnosis?.title || 'Проблема')}</span>`}</td>
              <td class="muted">${esc(s.userId?.email || '—')}</td>
              <td class="muted">${fmtDate(s.createdAt)}</td>
            </tr>`).join('')}
        </tbody>
      </table>
      ${pager(data.page, data.pages, 'scansPageGo')}
    `;
    lucide.createIcons();
  } catch (ex) { box.innerHTML = '<div class="empty">' + esc(ex.message) + '</div>'; }
}
window.scansPageGo = (p) => { scansPage = p; loadScans(); };

// ---------- HELPERS ----------
function pager(page, pages, fn) {
  if (pages <= 1) return '';
  return `<div class="pager">
    <button ${page <= 1 ? 'disabled' : ''} onclick="${fn}(${page - 1})">← Назад</button>
    <span class="muted">${page} / ${pages}</span>
    <button ${page >= pages ? 'disabled' : ''} onclick="${fn}(${page + 1})">Вперёд →</button>
  </div>`;
}
function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }

if (api.token) showApp();
lucide.createIcons();
</script>
</body>
</html>
